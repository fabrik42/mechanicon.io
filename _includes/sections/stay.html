<section class="section" id="stay">
  <div class="section-head">
    <span class="section-head__num">{{ include.num | default: "07" }}</span>
    <h2 class="section-head__title">stay up to date</h2>
  </div>

  <div class="stay-grid">
    <a class="stay-card stay-card--cyan" href="/discord" target="_blank" rel="noopener">
      <div class="stay-card__eyebrow">community</div>
      <h3 class="mc-h2">discord</h3>
      <p class="mc-body">Connect with other Mechanicon attendees and stay up to date with all things about the events.</p>
      <div class="stay-card__cta mc-cta mc-cta-cyan">&rarr; Join the server</div>
    </a>
    <a class="stay-card stay-card--pink" href="/newsletter">
      <div class="stay-card__eyebrow">in your mailbox</div>
      <h3 class="mc-h2">newsletter</h3>
      <p class="mc-body">We only use this newsletter to keep you up to date about upcoming events.</p>
      <div class="stay-card__cta mc-cta mc-cta-pink">&rarr; Sign up</div>
    </a>
  </div>
</section>
